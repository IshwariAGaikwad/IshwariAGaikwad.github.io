<style>
:root{
  /* Dusk / golden-hour palette */
  --bg:        #120e1c;
  --panel:     rgba(30,24,41,.72);
  --panel-2:   rgba(38,32,52,.85);
  --line:      #3b3153;
  --text:      #ece7f6;
  --muted:     #a094ba;
  --func:      #f2b263;   /* amber */
  --string:    #83d9c8;   /* teal */
  --keyword:   #f193ae;   /* rose */
  --number:    #c9a5ff;   /* lilac */
  --radius: 16px;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  background:var(--bg);
  color:var(--text);
  font-family:"IBM Plex Sans",system-ui,sans-serif;
  line-height:1.65;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}
::selection{background:var(--func);color:#170f08}

/* ---------- 3D graph-network background ---------- */
#net{
  position:fixed;inset:0;z-index:-2;display:block;
}
.glow-orb{
  position:fixed;z-index:-1;border-radius:50%;
  filter:blur(110px);opacity:.35;pointer-events:none;
}
.orb-1{width:480px;height:480px;background:#6a3b8f;top:-140px;left:-140px}
.orb-2{width:420px;height:420px;background:#8f5a2b;bottom:-120px;right:-120px}

.wrap{max-width:980px;margin:0 auto;padding:0 24px}

/* ---------- Nav ---------- */
nav{
  position:sticky;top:0;z-index:50;
  background:rgba(18,14,28,.72);
  backdrop-filter:blur(14px);
  border-bottom:1px solid rgba(59,49,83,.6);
}
.nav-inner{display:flex;align-items:center;justify-content:space-between;height:62px}
.logo{font-family:"IBM Plex Mono",monospace;font-weight:500;color:var(--text);text-decoration:none;font-size:.95rem}
.logo span{color:var(--string)}
.nav-links{display:flex;gap:22px}
.nav-links a{color:var(--muted);text-decoration:none;font-size:.9rem;transition:color .2s,text-shadow .2s}
.nav-links a:hover,.nav-links a:focus-visible{color:var(--func);text-shadow:0 0 14px rgba(242,178,99,.7)}
a:focus-visible{outline:2px solid var(--func);outline-offset:3px;border-radius:4px}

/* ---------- Hero: floating 3D terminal ---------- */
header{padding:84px 0 64px;perspective:1200px}
.terminal{
  background:rgba(18,14,26,.82);
  backdrop-filter:blur(8px);
  border:1px solid var(--line);
  border-radius:var(--radius);
  overflow:hidden;
  box-shadow:
    0 30px 80px rgba(0,0,0,.6),
    0 0 0 1px rgba(242,178,99,.06),
    0 0 60px rgba(201,165,255,.08);
  transform-style:preserve-3d;
  transition:transform .25s ease-out;
  animation:heroFloat 7s ease-in-out infinite;
}
@keyframes heroFloat{
  0%,100%{transform:translateY(0) rotateX(0deg)}
  50%{transform:translateY(-10px) rotateX(1.2deg)}
}
.term-bar{
  display:flex;align-items:center;gap:8px;
  padding:12px 16px;border-bottom:1px solid var(--line);
  background:rgba(26,20,38,.9);
}
.dot{width:11px;height:11px;border-radius:50%}
.dot:nth-child(1){background:#ff5f57}
.dot:nth-child(2){background:#febc2e}
.dot:nth-child(3){background:#28c840}
.term-title{margin-left:auto;font-family:"IBM Plex Mono",monospace;font-size:.75rem;color:var(--muted)}
.term-body{padding:28px 28px 32px;font-family:"IBM Plex Mono",monospace;font-size:.92rem}
.term-body .prompt{color:var(--string)}
.term-body .cmd{color:var(--text)}
.term-out{margin-top:18px}
.hero-name{
  font-family:"Sora",sans-serif;
  font-weight:800;
  font-size:clamp(2.2rem,6vw,3.7rem);
  letter-spacing:-.02em;
  line-height:1.08;
  background:linear-gradient(100deg,#fff 15%,var(--func) 45%,var(--keyword) 75%,var(--number) 100%);
  -webkit-background-clip:text;background-clip:text;
  -webkit-text-fill-color:transparent;color:transparent;
  filter:drop-shadow(0 6px 24px rgba(242,147,174,.25));
}
.hero-role{margin-top:12px;color:var(--keyword);font-size:1rem;text-shadow:0 0 20px rgba(241,147,174,.35)}
.hero-tag{margin-top:14px;color:var(--muted);max-width:58ch;font-family:"IBM Plex Sans",sans-serif;font-size:1rem}
.cursor{display:inline-block;width:9px;height:1.15em;background:var(--string);vertical-align:text-bottom;animation:blink 1s steps(1) infinite;box-shadow:0 0 10px var(--string)}
@keyframes blink{50%{opacity:0}}
.hero-actions{display:flex;flex-wrap:wrap;gap:12px;margin-top:28px}
.btn{
  display:inline-block;padding:11px 22px;border-radius:10px;
  font-size:.9rem;font-weight:600;text-decoration:none;
  transition:transform .18s,box-shadow .25s,background .2s;
  font-family:"IBM Plex Sans",sans-serif;
}
.btn-primary{background:linear-gradient(120deg,var(--func),#e89040);color:#170f08;box-shadow:0 6px 24px rgba(242,178,99,.35)}
.btn-primary:hover{transform:translateY(-3px) scale(1.03);box-shadow:0 12px 34px rgba(242,178,99,.5)}
.btn-ghost{border:1px solid var(--line);color:var(--text);background:rgba(30,24,41,.5)}
.btn-ghost:hover{background:var(--panel-2);transform:translateY(-3px) scale(1.03);box-shadow:0 10px 26px rgba(0,0,0,.4)}

/* ---------- Sections + scroll reveal ---------- */
section{padding:64px 0;perspective:1000px}
.reveal{
  opacity:0;
  transform:translateY(48px) rotateX(8deg);
  transform-origin:center top;
  transition:opacity .7s ease,transform .7s ease;
}
.reveal.in{opacity:1;transform:translateY(0) rotateX(0)}
.sec-label{
  font-family:"IBM Plex Mono",monospace;
  font-size:.8rem;color:var(--string);
  margin-bottom:8px;letter-spacing:.06em;
  text-shadow:0 0 16px rgba(131,217,200,.5);
}
h2{
  font-family:"Sora",sans-serif;font-weight:700;
  font-size:1.8rem;letter-spacing:-.01em;margin-bottom:30px;color:#fff;
}

/* ---------- 3D tilt cards (shared) ---------- */
.tilt{
  transform-style:preserve-3d;
  transition:transform .2s ease-out,border-color .25s,box-shadow .3s;
  will-change:transform;
}
.tilt:hover{box-shadow:0 24px 60px rgba(0,0,0,.5),0 0 40px rgba(242,178,99,.1)}
.tilt > *{transform:translateZ(24px)}

/* ---------- Skills ---------- */
.skill-groups{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:18px}
.skill-card{background:var(--panel);backdrop-filter:blur(8px);border:1px solid var(--line);border-radius:var(--radius);padding:22px 24px}
.skill-card:hover{border-color:var(--number)}
.skill-card h3{font-family:"IBM Plex Mono",monospace;font-size:.85rem;font-weight:500;color:var(--keyword);margin-bottom:12px}
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{
  font-family:"IBM Plex Mono",monospace;font-size:.78rem;
  border:1px solid var(--line);border-radius:6px;
  padding:4px 11px;color:var(--text);background:rgba(18,14,28,.7);
  transition:border-color .2s,box-shadow .2s,transform .2s;
}
.chip:hover{border-color:var(--string);box-shadow:0 0 14px rgba(131,217,200,.35);transform:translateY(-2px)}

/* ---------- Projects ---------- */
.proj-grid{display:grid;gap:20px}
.proj{
  background:var(--panel);backdrop-filter:blur(8px);
  border:1px solid var(--line);
  border-radius:var(--radius);padding:28px;
}
.proj:hover{border-color:var(--func)}
.proj-top{display:flex;justify-content:space-between;align-items:baseline;gap:12px;flex-wrap:wrap}
.proj h3{font-family:"Sora",sans-serif;font-size:1.2rem;font-weight:600;color:#fff}
.proj-year{font-family:"IBM Plex Mono",monospace;color:var(--number);font-size:.82rem;text-shadow:0 0 14px rgba(201,165,255,.5)}
.proj p{color:var(--muted);margin-top:10px;font-size:.95rem}
.proj-metrics{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}
.metric{font-family:"IBM Plex Mono",monospace;font-size:.75rem;color:var(--string);border:1px solid rgba(131,217,200,.35);border-radius:6px;padding:3px 9px;box-shadow:inset 0 0 12px rgba(131,217,200,.08)}
.proj-tech{margin-top:14px;font-family:"IBM Plex Mono",monospace;font-size:.78rem;color:var(--muted)}
.proj-tech span{color:var(--func)}
.proj a.plink{color:var(--func);text-decoration:none;font-size:.88rem;font-weight:600}
.proj a.plink:hover{text-decoration:underline}

/* ---------- Experience / Education / Certs ---------- */
.timeline{border-left:2px solid var(--line);margin-left:6px;padding-left:28px;display:grid;gap:32px}
.t-item{position:relative}
.t-item::before{
  content:"";position:absolute;left:-35px;top:7px;
  width:11px;height:11px;border-radius:50%;
  background:var(--bg);border:2px solid var(--func);
  box-shadow:0 0 14px rgba(242,178,99,.7);
}
.t-item h3{font-family:"Sora",sans-serif;font-size:1.05rem;font-weight:600;color:#fff}
.t-meta{font-family:"IBM Plex Mono",monospace;font-size:.8rem;color:var(--number);margin:4px 0 8px}
.t-item ul{list-style:none;display:grid;gap:6px}
.t-item ul li{color:var(--muted);font-size:.93rem;padding-left:18px;position:relative}
.t-item ul li::before{content:"›";position:absolute;left:0;color:var(--string)}

.cert-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px}
.cert{
  background:var(--panel);backdrop-filter:blur(8px);
  border:1px solid var(--line);border-radius:12px;
  padding:15px 18px;font-size:.9rem;display:flex;gap:10px;align-items:baseline;
}
.cert:hover{border-color:var(--keyword)}
.cert .c-idx{font-family:"IBM Plex Mono",monospace;color:var(--keyword);font-size:.78rem;flex-shrink:0}
.cert .c-org{color:var(--muted);font-size:.8rem;display:block;margin-top:2px}

/* ---------- Contact ---------- */
.contact-card{
  background:var(--panel);backdrop-filter:blur(10px);
  border:1px solid var(--line);
  border-radius:var(--radius);padding:38px;text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,.4),inset 0 0 60px rgba(201,165,255,.04);
}
.contact-card p{color:var(--muted);max-width:48ch;margin:8px auto 24px}
.contact-links{display:flex;flex-wrap:wrap;gap:12px;justify-content:center}

footer{border-top:1px solid rgba(59,49,83,.6);padding:28px 0;text-align:center;color:var(--muted);font-size:.82rem;font-family:"IBM Plex Mono",monospace}

@media (prefers-reduced-motion: reduce){
  .cursor{animation:none}
  .terminal{animation:none}
  .reveal{opacity:1;transform:none;transition:none}
  *{transition:none!important}
}
@media (max-width:640px){
  .nav-links{display:none}
  .term-body{padding:20px 18px 24px}
  section{padding:48px 0}
  .glow-orb{opacity:.25}
}
</style>
</head>
<body>

<canvas id="net" aria-hidden="true"></canvas>
<div class="glow-orb orb-1" aria-hidden="true"></div>

<nav>
  <div class="wrap nav-inner">

  <section id="certs" class="reveal">

  <section id="contact" class="reveal">

</main>

<footer>
  <div class="wrap" id="footer-text"></div>
</footer>

<script>
/* ================================================================
   ★★★★★★★★★★★★★★  EDIT EVERYTHING BELOW  ★★★★★★★★★★★★★★
   This is your content. Change any text between the quotes.
   To add a new project, copy one { ... } block in "projects"
   and paste it below the last one (keep the comma between blocks).
   ================================================================ */
const CONTENT = {

  name: "Ishwari Gaikwad",
  role: "Software Development Intern @ OpenLinks Foundation · Data Science",
  tagline: "Computer Science student at Pimpri Chinchwad University, Pune, with a strong interest in Data Science, Machine Learning, and Software Development — and a creative eye shaped by photography and visual storytelling.",

  // Your links
  email: "ishwarigaikwad11@gmail.com",
  github: "https://github.com/IshwariAGaikwad",
  linkedin: "https://www.linkedin.com/in/ishwari-gaikwad-159783281",
  resumeLink: "",  // optional: paste a link to your resume PDF, or leave ""

  skills: [
    { group: "languages",     items: ["Python", "Java", "JavaScript", "C / C++"] },
    { group: "web_and_data",  items: ["HTML", "CSS", "Node.js", "MySQL", "Streamlit", "Machine Learning"] },
    { group: "tools",         items: ["VS Code", "Git"] },
    { group: "soft_skills",   items: ["Communication & teamwork", "Problem-solving", "Time management", "Creative thinking"] }
  ],

  projects: [
    {
      title: "AI-Based Student Stress Prediction System",
      year: "Hackathon",
      description: "An AI-based system that predicts student stress levels using machine learning, with real-time monitoring delivered through a Streamlit web application.",
      metrics: ["Real-time monitoring", "Hackathon project"],
      tech: "Python · Machine Learning · Streamlit",
      link: ""   // ← paste a project / GitHub link here if you have one
    },
    {
      title: "Travel Booking Website",
      year: "",
      description: "A full travel booking site that automates booking and data management, reducing errors and improving overall system efficiency.",
      metrics: ["Automated booking & data management"],
      tech: "HTML · CSS · JavaScript · MySQL",
      link: ""
    }
  ],

  timeline: [
    {
      title: "Software Development Intern — OpenLinks Foundation",
      meta: "Jul 2026 – Present",
      points: [
        "Working on software development with hands-on, real-world projects",
        "Writing, testing, and debugging code as part of the development team"
      ]
    },
    {
      title: "Internship Trainee — JSM India Infosys (Remote)",
      meta: "Jul 2022 – Sep 2022",
      points: [
        "Learned and applied core Python concepts: data types, control flow, functions",
        "Solved problems and built mini-projects to strengthen logical thinking",
        "Gained hands-on exposure to software development and project workflows"
      ]
    },
    {
      title: "B.Tech, Computer Science & Engineering — PCET's Pimpri Chinchwad University",
      meta: "Aug 2024 – Present · CGPA 8.13",
      points: []
    },
    {
      title: "Diploma in Computer Science — Government Polytechnic Pune",
      meta: "2021 – 2024 · 79%",
      points: []
    },
    {
      title: "SSC — Infant Jesus High School",
      meta: "2020 · 97.8%",
      points: []
    }
  ],

  certifications: [
    { name: "Agile Project Management", org: "Google" },
    { name: "Foundations of Cybersecurity", org: "Google" },
    { name: "Software Engineering: Implementation and Testing", org: "HKUST via Coursera" },
    { name: "Prompt Engineering with GPT", org: "Coursera" },
    { name: "Training on Python", org: "Samsung Innovation Campus" },
    { name: "IBM Machine Learning", org: "IBM" }
  ],

  contactText: "I'm seeking software development roles and internships where I can apply and grow my technical expertise. The fastest way to reach me is email.",
  footer: "Built by Ishwari Gaikwad · Pune, India"
};
/* ================================================================
   ★★★★★★★★★★★★★  STOP EDITING — code below  ★★★★★★★★★★★★★
   ================================================================ */

const $ = id => document.getElementById(id);
const firstName = CONTENT.name.split(" ")[0].toLowerCase();
const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

$("nav-name").textContent = firstName;
$("term-title").textContent = firstName + "@portfolio — python3";
$("hero-name").textContent = CONTENT.name;
$("hero-role").textContent = CONTENT.role;
$("hero-tag").textContent = CONTENT.tagline;
$("contact-text").textContent = CONTENT.contactText;
$("footer-text").textContent = CONTENT.footer;
document.title = CONTENT.name + " — Portfolio";

// Hero buttons
const hasGithub = CONTENT.github && !CONTENT.github.includes("YOUR-GITHUB");
const actions = [
  ["View projects", "#projects", "btn-primary"],
  ["Email me", "mailto:" + CONTENT.email, "btn-ghost"]
];
if (hasGithub) actions.push(["GitHub", CONTENT.github, "btn-ghost"]);
if (CONTENT.resumeLink) actions.push(["Resume", CONTENT.resumeLink, "btn-ghost"]);
$("hero-actions").innerHTML = actions.map(([t, h, c]) =>
  `<a class="btn ${c}" href="${h}" ${h.startsWith("http") ? 'target="_blank" rel="noopener"' : ""}>${t}</a>`).join("");

// Skills
$("skills-container").innerHTML = CONTENT.skills.map(s => `
  <div class="skill-card tilt">
    <h3># ${s.group}</h3>
    <div class="chips">${s.items.map(i => `<span class="chip">${i}</span>`).join("")}</div>
  </div>`).join("");

// Projects
$("projects-container").innerHTML = CONTENT.projects.map(p => `
  <article class="proj tilt">
    <div class="proj-top">
      <h3>${p.title}</h3>
      ${p.year ? `<span class="proj-year">${p.year}</span>` : ""}
    </div>
    <p>${p.description}</p>
    ${p.metrics && p.metrics.length ? `<div class="proj-metrics">${p.metrics.map(m => `<span class="metric">${m}</span>`).join("")}</div>` : ""}
    <div class="proj-tech"><span>tech:</span> ${p.tech}</div>
    ${p.link ? `<div style="margin-top:12px"><a class="plink" href="${p.link}" target="_blank" rel="noopener">View project →</a></div>` : ""}
  </article>`).join("");

// Timeline
$("timeline-container").innerHTML = CONTENT.timeline.map(t => `
  <div class="t-item">
    <h3>${t.title}</h3>
    <div class="t-meta">${t.meta}</div>
    ${t.points.length ? `<ul>${t.points.map(p => `<li>${p}</li>`).join("")}</ul>` : ""}
  </div>`).join("");

// Certifications
$("certs-container").innerHTML = CONTENT.certifications.map((c, i) => `
  <div class="cert tilt"><span class="c-idx">${String(i + 1).padStart(2, "0")}</span>
    <span>${c.name}<span class="c-org">${c.org}</span></span>
  </div>`).join("");

// Contact links
const clinks = [
  ["✉ " + CONTENT.email, "mailto:" + CONTENT.email, "btn-primary"]
];
if (hasGithub) clinks.push(["GitHub", CONTENT.github, "btn-ghost"]);
clinks.push(["LinkedIn", CONTENT.linkedin, "btn-ghost"]);
$("contact-links").innerHTML = clinks.map(([t, h, c]) =>
  `<a class="btn ${c}" href="${h}" ${h.startsWith("http") ? 'target="_blank" rel="noopener"' : ""}>${t}</a>`).join("");

// Terminal typing animation
const cmdText = firstName + ".introduce()";
const cmdEl = $("typed-cmd");
if (reduceMotion) {
  cmdEl.textContent = cmdText;
  $("term-out").style.opacity = 1;
} else {
  let ti = 0;
  const type = () => {
    if (ti <= cmdText.length) {
      cmdEl.textContent = cmdText.slice(0, ti++);
      setTimeout(type, 55);
    } else {
      setTimeout(() => { $("term-out").style.opacity = 1; }, 250);
    }
  };
  setTimeout(type, 400);
}

/* ---------- Scroll reveal (3D rotate-in) ---------- */
const io = new IntersectionObserver(entries => {
  entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add("in"); io.unobserve(e.target); } });
}, { threshold: 0.12 });
document.querySelectorAll(".reveal").forEach(el => io.observe(el));

/* ---------- 3D tilt on hover ---------- */
const isTouch = matchMedia("(hover: none)").matches;
if (!reduceMotion && !isTouch) {
  document.querySelectorAll(".tilt").forEach(card => {
    card.addEventListener("mousemove", e => {
      const r = card.getBoundingClientRect();
      const px = (e.clientX - r.left) / r.width - 0.5;
      const py = (e.clientY - r.top) / r.height - 0.5;
      card.style.transform = `rotateY(${px * 10}deg) rotateX(${py * -10}deg) translateZ(6px)`;
    });
    card.addEventListener("mouseleave", () => { card.style.transform = ""; });
  });

  // Hero terminal gentle mouse parallax
  const term = $("hero-terminal");
  document.addEventListener("mousemove", e => {
    const px = e.clientX / innerWidth - 0.5;
    const py = e.clientY / innerHeight - 0.5;
    term.style.transform = `rotateY(${px * 4}deg) rotateX(${py * -4}deg)`;
  });
}

/* ---------- 3D rotating graph-network background ---------- */
(() => {
  const canvas = $("net");
  const ctx = canvas.getContext("2d");
  let W, H, DPR;
  const mobile = matchMedia("(max-width: 640px)").matches;
  const N = reduceMotion ? 0 : (mobile ? 42 : 90);   // node count
  const R = 340;                                      // sphere-ish radius
  const LINK_DIST = mobile ? 120 : 150;
  const COLORS = ["242,178,99", "131,217,200", "241,147,174", "201,165,255"];

  function resize() {
    DPR = Math.min(devicePixelRatio || 1, 2);
    W = innerWidth; H = innerHeight;
    canvas.width = W * DPR; canvas.height = H * DPR;
    canvas.style.width = W + "px"; canvas.style.height = H + "px";
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  resize();
  addEventListener("resize", resize);

  // Random 3D points
  const pts = Array.from({ length: N }, () => {
    const th = Math.random() * Math.PI * 2;
    const ph = Math.acos(2 * Math.random() - 1);
    const rr = R * (0.55 + Math.random() * 0.65);
    return {
      x: rr * Math.sin(ph) * Math.cos(th),
      y: rr * Math.sin(ph) * Math.sin(th) * 0.7,
      z: rr * Math.cos(ph),
      c: COLORS[Math.floor(Math.random() * COLORS.length)],
      s: 1.2 + Math.random() * 1.8
    };
  });

  let mx = 0, my = 0;
  if (!isTouch) document.addEventListener("mousemove", e => {
    mx = (e.clientX / W - 0.5) * 0.6;
    my = (e.clientY / H - 0.5) * 0.4;
  });

  let a = 0;
  const FOV = 620;

  function frame() {
    ctx.clearRect(0, 0, W, H);
    a += 0.0018;
    const ry = a + mx, rx = my * 0.8 + 0.15;
    const cy = Math.cos(ry), sy = Math.sin(ry);
    const cx2 = Math.cos(rx), sx2 = Math.sin(rx);
    const proj = [];

    for (const p of pts) {
      // rotate around Y then X
      let x = p.x * cy + p.z * sy;
      let z = -p.x * sy + p.z * cy;
      let y = p.y * cx2 - z * sx2;
      z = p.y * sx2 + z * cx2;
      const sc = FOV / (FOV + z + R);
      proj.push({ sx: W / 2 + x * sc, sy: H / 2 + y * sc, sc, z, c: p.c, s: p.s });
    }

    // edges
    ctx.lineWidth = 1;
    for (let i = 0; i < proj.length; i++) {
      for (let j = i + 1; j < proj.length; j++) {
        const A = proj[i], B = proj[j];
        const dx = A.sx - B.sx, dy = A.sy - B.sy;
        const d = Math.hypot(dx, dy);
        if (d < LINK_DIST) {
          const depth = Math.min(A.sc, B.sc);
          const alpha = (1 - d / LINK_DIST) * 0.35 * depth;
          ctx.strokeStyle = `rgba(${A.c},${alpha.toFixed(3)})`;
          ctx.beginPath(); ctx.moveTo(A.sx, A.sy); ctx.lineTo(B.sx, B.sy); ctx.stroke();
        }
      }
    }
    // nodes
    for (const p of proj) {
      const alpha = 0.35 + p.sc * 0.5;
      ctx.fillStyle = `rgba(${p.c},${Math.min(alpha, 0.95).toFixed(3)})`;
      ctx.beginPath(); ctx.arc(p.sx, p.sy, p.s * p.sc, 0, Math.PI * 2); ctx.fill();
    }
    requestAnimationFrame(frame);
  }
  if (N > 0) requestAnimationFrame(frame);
})();
</script>
</body>
</html>
